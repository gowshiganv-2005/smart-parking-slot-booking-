<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Parking System - Create your account">
    <title>Smart Parking | Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">🅿️</div>
                <h1>Smart Parking</h1>
                <p>Create your account</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="9876543210" required autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role" required>
                        <option value="User">User</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required
                        autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn" onclick="handleRegister()">
                    Create Account
                </button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>

</html>
