<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Parking System - Login to book your parking slot">
    <title>Smart Parking | Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">🅿️</div>
                <h1>Smart Parking</h1>
                <p>Sign in to book your slot</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email / Admin Username</label>
                    <input type="text" id="email" placeholder="you@example.com or admin" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
                    Sign In
                </button>
            </form>

            <div class="auth-link">
                Don't have an account? <a href="/register">Create Account</a>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>

</html>
